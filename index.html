<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#F8FAFC" id="meta-theme">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>0v0 – Gestão de Vendas</title>
<link rel="icon" href="0v0-icon.jpg">
<link rel="apple-touch-icon" href="0v0-icon.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/tabler-icons.min.css">
<script src="config.js"></script>
<style>
:root{
  --g:#00C896;--gd:#008F6A;--gp:#E0FAF4;--gt:#06231B;
  --b:#3B82F6;--bp:#EFF6FF;
  --a:#F59E0B;--ap:#FEF3C7;
  --r:#EF4444;--rp:#FEE2E2;
  --bg:#F1F5F9;--s:#FFFFFF;--s2:#F8FAFB;
  --br:#E2E8F0;--br2:#CBD5E1;
  --t:#0F172A;--t2:#475569;--t3:#94A3B8;
  --rr:10px;--rl:16px;--rx:20px;--rf:999px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.04);
  --shl:0 8px 30px rgba(0,0,0,.1);
  --fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
}
:root[data-theme=dark]{
  --g:#14D6A4;--gd:#5EE0BD;--gp:#0D2E26;--gt:#E0FAF4;
  --b:#60A5FA;--bp:#132C4C;
  --a:#FBBF24;--ap:#3A2B0E;
  --r:#F87171;--rp:#3B1717;
  --bg:#0A0F1E;--s:#111827;--s2:#0D1424;
  --br:#1E2D45;--br2:#2D3F5A;
  --t:#F0F6FF;--t2:#94A3B8;--t3:#4B5A72;
  --sh:0 1px 3px rgba(0,0,0,.3),0 4px 20px rgba(0,0,0,.2);
  --shl:0 8px 32px rgba(0,0,0,.45);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:var(--fb);color:var(--t);font-size:15px;-webkit-font-smoothing:antialiased}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.screen{display:none;flex-direction:column;min-height:100vh}
.screen.active{display:flex}

/* LOGIN */
#s-login{align-items:center;justify-content:center;padding:2rem;background:var(--bg);background-image:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(0,200,150,.12) 0%,transparent 70%)}
:root[data-theme=dark] #s-login{background-image:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(20,214,164,.1) 0%,transparent 70%)}
.login-brand{text-align:center;margin-bottom:2rem}
.login-logo{width:76px;height:76px;background:var(--s);border:1px solid var(--br);border-radius:22px;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;box-shadow:0 0 0 6px rgba(0,200,150,.1),var(--sh);overflow:hidden;padding:10px}
.login-logo img{width:100%;height:100%;object-fit:contain}
.login-brand h1{font-family:var(--fh);font-size:32px;font-weight:800;color:var(--t);letter-spacing:-.5px;line-height:1}
.brand-zero{position:relative;display:inline-block}
.brand-zero::after{content:"";position:absolute;left:18%;right:18%;top:50%;height:2.5px;background:var(--g);transform:rotate(-25deg);border-radius:2px}
.login-brand p{font-size:14px;color:var(--t3);margin-top:6px}
.login-card{background:var(--s);border:1px solid var(--br);border-radius:var(--rx);padding:1.75rem;width:100%;box-shadow:var(--shl)}
.ltabs{display:flex;background:var(--bg);border-radius:var(--rr);padding:4px;margin-bottom:1.5rem;gap:4px}
.ltab{flex:1;text-align:center;padding:9px;font-size:13px;font-weight:600;font-family:var(--fh);color:var(--t3);cursor:pointer;border-radius:8px;transition:.2s;letter-spacing:.02em}
.ltab.on{background:var(--s);color:var(--t);box-shadow:var(--sh)}
:root[data-theme=dark] .ltab.on{background:var(--s2)}
.lf{margin-bottom:1rem}
.lf label{display:block;font-size:11px;font-weight:600;color:var(--t3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
.lf input{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--br);border-radius:var(--rr);color:var(--t);font-size:15px;font-family:var(--fb);outline:none;transition:.2s}
.lf input:focus{border-color:var(--g);background:var(--s)}
.lf input::placeholder{color:var(--t3)}
.lerr{font-size:13px;color:var(--r);background:var(--rp);border:1px solid rgba(239,68,68,.25);border-radius:var(--rr);padding:9px 12px;margin-bottom:1rem;display:none}
.lbtn{width:100%;padding:13px;background:var(--g);color:var(--gt);border:none;border-radius:var(--rr);font-size:15px;font-weight:700;font-family:var(--fh);cursor:pointer;letter-spacing:.03em;transition:.15s}
.lbtn:active{transform:scale(.98)}
.demo-hint{margin-top:1.25rem;font-size:12px;color:var(--t3);text-align:center;line-height:1.7}
.demo-hint code{background:var(--bg);border:1px solid var(--br);border-radius:5px;padding:1px 6px;font-size:11px;color:var(--t2);font-family:monospace}
.theme-float{position:fixed;top:14px;right:14px;z-index:99;width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:var(--s);border:1px solid var(--br);border-radius:var(--rr);cursor:pointer;color:var(--t2);box-shadow:var(--sh);transition:.15s}
.theme-float img,.btn-ico{width:18px;height:18px;object-fit:contain;display:block;mix-blend-mode:multiply}
:root[data-theme=dark] .theme-float img,:root[data-theme=dark] .btn-ico,:root[data-theme=dark] .stock-ico{filter:invert(1);mix-blend-mode:screen}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--s);border-bottom:1px solid var(--br);position:sticky;top:0;z-index:50}
.tb-left{display:flex;align-items:center;gap:10px}
.tb-logo{width:32px;height:32px;background:var(--s);border:1px solid var(--br);border-radius:9px;overflow:hidden;padding:4px;display:flex;align-items:center;justify-content:center}
.tb-logo img{width:100%;height:100%;object-fit:contain}
.tb-title{font-family:var(--fh);font-size:16px;font-weight:800;color:var(--t)}
.tb-right{display:flex;align-items:center;gap:6px}
.t-av{width:30px;height:30px;border-radius:50%;background:var(--gp);display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:11px;font-weight:700;color:var(--gd)}
.t-av.adm{background:var(--ap);color:#92400E}
.t-badge{font-size:10px;padding:2px 8px;border-radius:var(--rf);font-weight:700;font-family:var(--fh);letter-spacing:.04em}
.tb-adm{background:var(--ap);color:#92400E}
.tb-rev{background:var(--bp);color:#1D4ED8}
.ib{height:34px;min-width:34px;padding:0 10px;display:flex;align-items:center;justify-content:center;gap:5px;background:none;border:1px solid var(--br);border-radius:var(--rr);cursor:pointer;color:var(--t2);transition:.15s;font-family:var(--fh);font-size:12px;font-weight:700}
.ib:hover{background:var(--bg)}
.ib i{font-size:17px}
@media(max-width:400px){.t-badge{display:none}.ib{padding:0 8px;font-size:11px}.tb-right{gap:4px}}
.pass-btn{background:var(--bp);border-color:#BFDBFE;color:#1D4ED8}

/* NAV */
.nav{display:flex;background:var(--s);border-bottom:1px solid var(--br)}
.nt{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 4px 8px;cursor:pointer;color:var(--t3);font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;border-bottom:2px solid transparent;transition:.15s;position:relative}
.nt i{font-size:19px}
.nt.active{color:var(--gd);border-bottom-color:var(--g)}
.nt-dot{position:absolute;top:7px;right:calc(50% - 12px);width:7px;height:7px;background:var(--r);border-radius:50%;border:2px solid var(--s);display:none}
.nt-dot.show{display:block}

/* CONTENT */
.content{flex:1;padding:14px 14px 24px;overflow-y:auto}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.sc{background:var(--s);border:1px solid var(--br);border-radius:var(--rl);padding:13px}
.sc-l{font-size:11px;color:var(--t2);margin-bottom:5px;font-weight:500}
.sc-v{font-size:20px;font-weight:700;font-family:var(--fh);color:var(--t)}
.sc-v.cg{color:var(--gd)}.sc-v.cb{color:var(--b)}.sc-v.ca{color:#D97706}.sc-v.cr{color:var(--r)}
.sc-sub{font-size:11px;color:var(--t3);margin-top:3px}

/* LOTE STRIP */
.lote-strip{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--s);border:1px solid var(--br);border-radius:var(--rl);padding:11px 14px;margin-bottom:12px}
.ls-left{display:flex;align-items:center;gap:8px;min-width:0}
.ls-icon{width:32px;height:32px;border-radius:var(--rr);background:var(--gp);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ls-icon i{font-size:17px;color:var(--gd)}
.stock-ico{width:19px;height:19px;object-fit:contain;display:block;mix-blend-mode:multiply}
.ls-info{min-width:0}
.ls-label{font-size:12px;font-weight:600;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ls-bar-wrap{display:flex;align-items:center;gap:6px;margin-top:4px}
.ls-bar{flex:1;height:5px;background:var(--bg);border-radius:var(--rf);overflow:hidden;min-width:60px}
.ls-fill{height:100%;background:var(--g);border-radius:var(--rf);transition:.3s}
.ls-qty{font-size:11px;color:var(--t3);white-space:nowrap}
.ls-btn{padding:6px 12px;border:1px solid var(--br);border-radius:var(--rr);background:none;color:var(--t2);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--fh);white-space:nowrap;flex-shrink:0}
.ls-btn:hover{background:var(--bg)}
.lote-empty{display:flex;align-items:center;gap:10px;background:var(--ap);border:1px solid #FCD34D;border-radius:var(--rl);padding:11px 14px;margin-bottom:12px;font-size:13px;color:#92400E}

/* FAB */
.fab{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;background:var(--g);color:var(--gt);border:none;border-radius:var(--rl);font-size:15px;font-weight:700;font-family:var(--fh);cursor:pointer;margin-bottom:12px;letter-spacing:.02em;transition:.15s;box-shadow:0 4px 14px rgba(0,200,150,.25)}
.fab i{font-size:20px}
.fab:active{transform:scale(.98)}

/* CHIPS */
.chips{display:flex;gap:7px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{padding:6px 14px;border:1px solid var(--br);border-radius:var(--rf);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;color:var(--t2);background:var(--s);transition:.15s;flex-shrink:0}
.chip.on{background:var(--gp);border-color:var(--g);color:var(--gd)}

/* NOTIF */
.notif{display:flex;align-items:center;gap:8px;background:var(--ap);border:1px solid #FCD34D;border-radius:var(--rr);padding:9px 12px;margin-bottom:12px;font-size:13px;color:#92400E}
.notif i{font-size:16px;flex-shrink:0}

/* PEDIDO CARD - COMPACT + EXPANDABLE */
.pc{background:var(--s);border:1px solid var(--br);border-radius:var(--rl);margin-bottom:8px;overflow:hidden;transition:border-color .2s,box-shadow .2s}
.pc.open{border-color:var(--g);box-shadow:0 0 0 3px rgba(0,200,150,.1)}
.pc-top{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none}
.pc-stripe{width:4px;height:36px;border-radius:var(--rf);flex-shrink:0;transition:background .2s}
.stripe-sol{background:#FCD34D}.stripe-ped{background:#FCD34D}.stripe-ent{background:var(--b)}.stripe-pag{background:var(--g)}
.pc-main{flex:1;min-width:0}
.pc-name{font-size:15px;font-weight:600;font-family:var(--fh);color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc-sub{font-size:12px;color:var(--t2);margin-top:2px}
.pc-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.pc-val{font-size:15px;font-weight:700;font-family:var(--fh);color:var(--t)}
.pc-chevron{color:var(--t3);transition:transform .2s;font-size:16px;line-height:1}
.pc.open .pc-chevron{transform:rotate(180deg)}
.pc-age{font-size:11px;font-weight:600;color:#92400E;background:#FEF3C7;border:1px solid #FCD34D;border-radius:var(--rf);padding:2px 7px}

/* PEDIDO DETAIL */
.pc-detail{display:none;padding:0 14px 14px}
.pc.open .pc-detail{display:block}
.pd-divider{height:1px;background:var(--br);margin-bottom:12px}
.pd-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.pd-item{background:var(--bg);border-radius:var(--rr);padding:9px 11px}
.pd-lbl{font-size:11px;color:var(--t3);margin-bottom:3px;font-weight:500}
.pd-val{font-size:13px;font-weight:600;color:var(--t)}
.pc-obs{font-size:12px;color:var(--t2);background:var(--s2);border-radius:var(--rr);padding:8px 11px;margin-bottom:10px;border-left:3px solid var(--br2);display:flex;align-items:flex-start;gap:6px;font-style:italic}
.pc-obs i{flex-shrink:0;margin-top:1px;color:var(--t3)}
.pd-acts{display:flex;gap:7px;flex-wrap:wrap}
.pd-act{flex:1;min-width:0;padding:9px 6px;background:var(--bg);border:1px solid var(--br);border-radius:var(--rr);font-size:12px;font-weight:600;cursor:pointer;color:var(--t2);display:flex;align-items:center;justify-content:center;gap:4px;font-family:var(--fh);transition:.15s;white-space:nowrap}
.pd-act:hover{background:var(--s);border-color:var(--br2)}
.pd-act.green{background:var(--gp);border-color:var(--g);color:var(--gd)}
.pd-act.blue{background:var(--bp);border-color:var(--b);color:#1D4ED8}
.pd-act.danger{background:var(--rp);border-color:var(--r);color:var(--r)}
.pd-act i{font-size:14px}
.pd-approve{width:100%;padding:10px;background:var(--g);color:var(--gt);border:none;border-radius:var(--rr);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--fh);margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:6px}
.sp{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;border-radius:var(--rf);padding:3px 9px;font-family:var(--fh);letter-spacing:.02em;border:1px solid}
.sp-sol,.sp-ped{border-color:#FCD34D;color:#92400E;background:#FEF9C3}
.sp-ent{border-color:#93C5FD;color:#1D4ED8;background:#EFF6FF}
.sp-pag{border-color:#6EE7B7;color:#065F46;background:#D1FAE5}
.pp{font-size:11px;font-weight:600;border-radius:var(--rf);padding:2px 8px}
.pp-pix{background:#E8F5FF;color:#0369A1}
.pp-din{background:#F0FFF4;color:#166534}
.pp-fia{background:#FFF7ED;color:#C2410C}

/* SECTION LABEL */
.slabel{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin:16px 0 8px}

/* PAGOS */
.pago-card{background:var(--s);border:1px solid var(--br);border-radius:var(--rl);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.pago-dot{width:8px;height:8px;border-radius:50%;background:var(--g);flex-shrink:0}
.pago-body{flex:1;min-width:0}
.pago-nome{font-size:14px;font-weight:600;font-family:var(--fh);color:var(--t)}
.pago-meta{font-size:12px;color:var(--t2);margin-top:2px}
.pago-val{font-size:16px;font-weight:700;font-family:var(--fh);color:var(--gd)}

/* RESUMO */
.periodo-tabs{display:flex;gap:6px;margin-bottom:14px}
.ptab{flex:1;padding:9px 4px;text-align:center;font-size:12px;font-weight:700;font-family:var(--fh);border:1px solid var(--br);border-radius:var(--rr);cursor:pointer;color:var(--t2);background:var(--s);transition:.15s;letter-spacing:.04em}
.ptab.on{background:var(--t);border-color:var(--t);color:var(--s)}
:root[data-theme=dark] .ptab.on{color:var(--bg)}
.rev-card{background:var(--s);border:1px solid var(--br);border-radius:var(--rl);padding:13px 14px;margin-bottom:8px;cursor:pointer;transition:.15s}
.rev-card:hover{border-color:var(--br2);box-shadow:var(--sh)}
.rc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.rc-name{font-size:14px;font-weight:700;font-family:var(--fh)}
.rc-count{font-size:12px;color:var(--t3)}
.rc-vals{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.rcv{text-align:center;background:var(--bg);border-radius:var(--rr);padding:8px 4px}
.rcv-l{font-size:10px;color:var(--t3);margin-bottom:2px;font-weight:500}
.rcv-v{font-size:13px;font-weight:700;color:var(--t)}
.export-btn{display:flex;align-items:center;gap:6px;padding:9px 14px;background:var(--s);border:1px solid var(--br);border-radius:var(--rr);font-size:13px;font-weight:500;cursor:pointer;color:var(--t2);margin-bottom:14px;transition:.15s;width:100%}
.export-btn:hover{background:var(--bg)}
.export-btn i{font-size:17px}

/* HISTÓRICO */
.hsearch{position:relative;margin-bottom:12px}
.hsearch input{width:100%;padding:10px 14px 10px 38px;border:1px solid var(--br);border-radius:var(--rr);background:var(--s);color:var(--t);font-size:15px;font-family:var(--fb);outline:none;transition:.2s}
.hsearch input:focus{border-color:var(--g)}
.hsearch i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:17px}
.cpills{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.cpill{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border:1px solid var(--br);border-radius:var(--rf);font-size:13px;cursor:pointer;color:var(--t2);background:var(--s);transition:.15s}
.cpill:hover,.cpill.on{background:var(--gp);border-color:var(--g);color:var(--gd)}
.cpill-ct{font-size:11px;color:var(--t3)}

/* USERS / CONFIG */
.user-item{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--s);border:1px solid var(--br);border-radius:var(--rl);margin-bottom:8px}
.u-left{display:flex;align-items:center;gap:10px}
.u-av{width:36px;height:36px;border-radius:50%;background:var(--gp);display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:13px;font-weight:700;color:var(--gd)}
.u-av.adm{background:var(--ap);color:#92400E}
.u-name{font-size:14px;font-weight:600;font-family:var(--fh)}
.u-meta{font-size:12px;color:var(--t3);margin-top:1px}
.del-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;background:var(--rp);border:1px solid var(--r);border-radius:var(--rr);cursor:pointer;color:var(--r);transition:.15s}
.del-btn:hover{background:var(--r);color:#fff}
.user-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
.role-btn{height:30px;padding:0 9px;border:1px solid var(--br);border-radius:var(--rr);background:var(--bg);color:var(--t2);font-family:var(--fh);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
.role-btn.admin{background:var(--ap);border-color:#FCD34D;color:#92400E}
.role-btn.rev{background:var(--bp);border-color:#BFDBFE;color:#1D4ED8}
.lote-actions{display:flex;gap:8px;justify-content:flex-end}
.lote-actions button{height:30px;padding:0 10px;border-radius:var(--rr);font-family:var(--fh);font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--br);background:var(--bg);color:var(--t2)}
.lote-actions .edit{background:var(--bp);border-color:#BFDBFE;color:#1D4ED8}
.lote-actions .danger{background:var(--rp);border-color:var(--r);color:var(--r)}
.add-box{background:var(--s);border:1px dashed var(--br2);border-radius:var(--rl);padding:14px;margin-bottom:16px}
.add-box h4{font-size:13px;font-weight:700;font-family:var(--fh);color:var(--t);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.mf{margin-bottom:10px}
.mf label{display:block;font-size:11px;font-weight:600;color:var(--t3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.mf input,.mf select,.mf textarea{width:100%;padding:10px 12px;border:1px solid var(--br);border-radius:var(--rr);background:var(--bg);color:var(--t);font-size:14px;font-family:var(--fb);outline:none;transition:.2s}
.mf input:focus,.mf select:focus,.mf textarea:focus{border-color:var(--g);background:var(--s)}
.mf textarea{resize:vertical;min-height:64px}
.add-row{display:flex;gap:8px;flex-wrap:wrap}
.add-row input{flex:1;min-width:90px;padding:9px 12px;border:1px solid var(--br);border-radius:var(--rr);background:var(--bg);color:var(--t);font-size:14px;font-family:var(--fb);outline:none}
.add-row input:focus{border-color:var(--g)}
.add-row button{padding:9px 14px;background:var(--g);color:var(--gt);border:none;border-radius:var(--rr);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--fh)}
.cap-warn{font-size:12px;color:var(--a);margin-top:8px;display:none;align-items:center;gap:4px}

/* MODAL */
.mo{display:none;position:fixed;inset:0;background:rgba(10,15,30,.55);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px)}
.mo.open{display:flex}
.modal{background:var(--s);border-radius:22px 22px 0 0;padding:1.5rem 1.5rem 2rem;width:100%;max-height:92vh;overflow-y:auto;animation:su .25s cubic-bezier(.32,1,.6,1)}
@keyframes su{from{transform:translateY(50px);opacity:.3}to{transform:translateY(0);opacity:1}}
.mhandle{width:36px;height:4px;background:var(--br2);border-radius:var(--rf);margin:0 auto 1.25rem}
.mtitle{font-family:var(--fh);font-size:18px;font-weight:700;margin-bottom:1.25rem;color:var(--t)}
.mrow{display:flex;gap:10px}
.mrow .mf{flex:1}
.mbtns{display:flex;gap:10px;margin-top:1.25rem}
.m-cancel{flex:1;padding:12px;background:none;border:1px solid var(--br);border-radius:var(--rr);font-size:14px;cursor:pointer;color:var(--t2);font-family:var(--fb)}
.m-save{flex:2;padding:12px;background:var(--g);color:var(--gt);border:none;border-radius:var(--rr);font-size:15px;font-weight:700;cursor:pointer;font-family:var(--fh);letter-spacing:.02em}
.m-save:active{transform:scale(.98)}
.calc-preview{background:var(--bg);border:1px solid var(--br);border-radius:var(--rr);padding:10px 12px;margin:10px 0;display:flex;justify-content:space-between;align-items:center}
.calc-preview span{font-size:13px;color:var(--t2)}
.calc-preview strong{font-size:16px;font-weight:700;font-family:var(--fh);color:var(--t)}

/* DETALHE MODAL */
.det-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--br);font-size:14px}
.det-row:last-child{border:none}
.det-row span{color:var(--t2)}
.det-row strong{font-family:var(--fh);font-weight:700;color:var(--t);text-align:right}
.det-sub{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin:14px 0 6px}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--t);color:var(--s);padding:10px 20px;border-radius:var(--rf);font-size:14px;font-weight:500;z-index:300;opacity:0;pointer-events:none;transition:.3s;white-space:nowrap;max-width:85vw;box-shadow:var(--shl)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* EMPTY */
.empty{text-align:center;padding:3rem 1rem;color:var(--t3);font-size:14px;display:flex;flex-direction:column;align-items:center;gap:10px}
.empty i{font-size:44px;opacity:.35}
</style>
</head>

<script>
// ── STATE ──
let users=[
  {id:'iuri',name:'Iuri',username:'iuri',pass:'1234',role:'admin'},
];
let pedidos=[];
let lotes=[];
let nextId=1,nextLoteId=1,curUser=null,filtro='todos',periodo='semana',histCliente=null;
const PRECO=25,VER='0v0-real-clean-v1';
const BACKEND=window.OVO_CONFIG||{};
const sbReady=Boolean(BACKEND.SUPABASE_URL&&BACKEND.SUPABASE_ANON_KEY);
const apiBase=sbReady?`${BACKEND.SUPABASE_URL.replace(/\/$/,'')}/rest/v1`:null;
let remoteMode=false;

// ── HELPERS ──
const ini=n=>n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const fmtFull=d=>{if(!d)return'';const[y,m,dd]=d.split('-');return`${dd}/${m}/${y}`};
const today=()=>new Date().toISOString().slice(0,10);
const diffDays=d=>Math.floor((new Date()-new Date(d))/864e5);
const revName=id=>users.find(u=>u.id===id)?.name||id;
const pgtoLabel=p=>({pix:'Pix',dinheiro:'Dinheiro',fiado:'Fiado'}[p]||p);
const pgtoClass=p=>({pix:'pp-pix',dinheiro:'pp-din',fiado:'pp-fia'}[p]||'');
const R$=v=>`R$ ${(+v||0).toFixed(2)}`;
const loteUsado=id=>pedidos.filter(p=>p.loteId===id&&p.status!=='solicitado').reduce((s,p)=>s+p.qtd,0);
const loteRest=l=>Math.max(0,(l?.qtd||0)-loteUsado(l?.id));
const loteAtivo=()=>lotes.slice().sort((a,b)=>a.id-b.id).find(l=>loteRest(l)>0)||null;
const loteNome=l=>l?`Lote ${fmtFull(l.data)}`:'Sem lote';
const myPedidos=()=>curUser.role==='admin'?pedidos:pedidos.filter(p=>p.rev===curUser.id);

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2300)}
function sg(k){try{return localStorage.getItem(k)}catch{return null}}
function ss(k,v){try{localStorage.setItem(k,v)}catch{}}
async function hashPass(pass){
  const data=new TextEncoder().encode(`0v0:${pass}`);
  const hash=await crypto.subtle.digest('SHA-256',data);
  return [...new Uint8Array(hash)].map(b=>b.toString(16).padStart(2,'0')).join('');
}
function toDbOrder(p){
  return {id:p.id,cliente:p.cliente,qtd:p.qtd,valor:p.valor,desconto:p.desconto||0,status:p.status,rev:p.rev,data:p.data,data_pago:p.dataPago||null,pgto:p.pgto||'pix',obs:p.obs||'',lote_id:p.loteId||null};
}
function fromDbOrder(p){
  return {id:p.id,cliente:p.cliente,qtd:p.qtd,valor:Number(p.valor)||0,desconto:Number(p.desconto)||0,status:p.status,rev:p.rev,data:p.data,dataPago:p.data_pago||null,pgto:p.pgto||'pix',obs:p.obs||'',loteId:p.lote_id||null};
}
function toDbLot(l){return {id:l.id,data:l.data,qtd:l.qtd,obs:l.obs||''}}
function fromDbLot(l){return {id:l.id,data:l.data,qtd:l.qtd,obs:l.obs||''}}
function toDbUser(u){return {id:u.id,name:u.name,username:u.username,role:u.role,pass_hash:u.passHash||u.pass_hash||''}}
function fromDbUser(u){return {id:u.id,name:u.name,username:u.username,role:u.role,passHash:u.pass_hash}}
async function api(path,options={}){
  const res=await fetch(`${apiBase}${path}`,{
    ...options,
    headers:{
      apikey:BACKEND.SUPABASE_ANON_KEY,
      Authorization:`Bearer ${BACKEND.SUPABASE_ANON_KEY}`,
      'Content-Type':'application/json',
      ...(options.headers||{})
    }
  });
  if(!res.ok)throw new Error(await res.text());
  if(res.status===204)return null;
  const text=await res.text();
  return text?JSON.parse(text):null;
}
async function selectTable(table){
  return await api(`/${table}?select=*`);
}
async function upsertTable(table,rows){
  if(!rows.length)return;
  await api(`/${table}?on_conflict=id`,{
    method:'POST',
    headers:{Prefer:'resolution=merge-duplicates,return=minimal'},
    body:JSON.stringify(rows)
  });
}
async function save(){
  ss('0v0_u',JSON.stringify(users));ss('0v0_p',JSON.stringify(pedidos));ss('0v0_l',JSON.stringify(lotes));ss('0v0_ni',nextId);ss('0v0_nl',nextLoteId);
  if(!remoteMode)return;
  const userRows=users.map(toDbUser).filter(u=>u.pass_hash);
  const lotRows=lotes.map(toDbLot);
  const orderRows=pedidos.map(toDbOrder);
  await upsertTable('app_users',userRows);
  await upsertTable('lots',lotRows);
  await upsertTable('orders',orderRows);
}
function load(){
  if(sg('0v0_ver')!==VER){save();ss('0v0_ver',VER);return}
  const u=sg('0v0_u'),p=sg('0v0_p'),l=sg('0v0_l');
  if(u&&p&&l){users=JSON.parse(u);pedidos=JSON.parse(p);lotes=JSON.parse(l);nextId=+sg('0v0_ni')||nextId;nextLoteId=+sg('0v0_nl')||nextLoteId}
}
async function loadRemote(){
  if(!sbReady)return false;
  let u,p,l;
  try{
    [u,p,l]=await Promise.all([selectTable('app_users'),selectTable('orders'),selectTable('lots')]);
  }catch(err){
    console.warn('Supabase indisponivel',err);
    return false;
  }
  users=(u||[]).map(fromDbUser);
  pedidos=(p||[]).map(fromDbOrder).sort((a,b)=>a.id-b.id);
  lotes=(l||[]).map(fromDbLot).sort((a,b)=>a.id-b.id);
  nextId=(Math.max(0,...pedidos.map(x=>x.id))+1)||1;
  nextLoteId=(Math.max(0,...lotes.map(x=>x.id))+1)||1;
  remoteMode=true;
  return true;
}
async function deleteRemote(table,id){
  if(remoteMode)await api(`/${table}?id=eq.${encodeURIComponent(id)}`,{method:'DELETE',headers:{Prefer:'return=minimal'}});
}
function filterByPeriod(list,f){
  const now=new Date();
  return list.filter(p=>{const d=p[f];if(!d)return false;const dt=new Date(d);
    if(periodo==='semana')return(now-dt)/864e5<=7;
    if(periodo==='mes')return dt.getMonth()===now.getMonth()&&dt.getFullYear()===now.getFullYear();
    return dt.getFullYear()===now.getFullYear()});
}

// ── THEME ──
let theme=sg('0v0_theme')||'light';
function applyTheme(){
  document.documentElement.setAttribute('data-theme',theme);
  document.getElementById('meta-theme').content=theme==='dark'?'#0A0F1E':'#F8FAFC';
  const dashBtn=document.getElementById('th-btn');
  if(dashBtn)dashBtn.innerHTML=`<img class="btn-ico" src="theme-icon.jpg" alt=""><span>${theme==='dark'?'Claro':'Tema'}</span>`;
  const floatBtn=document.getElementById('th-float');
  if(floatBtn)floatBtn.innerHTML=`<img src="theme-icon.jpg" alt="Tema">`;
}
function toggleTheme(){theme=theme==='dark'?'light':'dark';ss('0v0_theme',theme);applyTheme()}

// ── AUTH ──
function loginTab(tab,el){
  document.querySelectorAll('.ltab').forEach(x=>x.classList.remove('on'));el.classList.add('on');
  document.getElementById('l-form').style.display=tab==='login'?'':'none';
  document.getElementById('l-cad').style.display=tab==='cad'?'':'none';
  document.getElementById('l-err').style.display='none';
}
function showErr(m){const e=document.getElementById('l-err');e.textContent=m;e.style.display=''}
async function doLogin(){
  const u=document.getElementById('l-user').value.trim().toLowerCase();
  const p=document.getElementById('l-pass').value;
  const passHash=await hashPass(p);
  const f=users.find(x=>x.username.toLowerCase()===u&&(remoteMode?x.passHash===passHash:x.pass===p));
  if(!f){showErr('Usuário ou senha incorretos.');return}
  enterDash(f);
}
async function doRegister(){
  const nome=document.getElementById('c-nome').value.trim();
  const u=document.getElementById('c-user').value.trim().toLowerCase();
  const p=document.getElementById('c-pass').value;
  if(!nome||!u||p.length<4){showErr('Preencha tudo (senha mín. 4 caracteres).');return}
  if(users.find(x=>x.username.toLowerCase()===u)){showErr('Usuário já existe.');return}
  if(users.filter(x=>x.role==='rev').length>=5){showErr('Limite de 5 revendedores atingido.');return}
  const nu={id:u,name:nome,username:u,pass:p,passHash:await hashPass(p),role:'rev'};
  users.push(nu);await save();enterDash(nu);
}
function enterDash(user){
  curUser=user;
  document.getElementById('nav-av').textContent=ini(user.name);
  document.getElementById('nav-av').className='t-av'+(user.role==='admin'?' adm':'');
  const b=document.getElementById('nav-badge');
  b.textContent=user.role==='admin'?'ADMIN':'REVENDEDOR';
  b.className='t-badge '+(user.role==='admin'?'tb-adm':'tb-rev');
  document.querySelectorAll('.admin-only').forEach(el=>el.style.display=user.role==='admin'?'':'none');
  showScreen('s-dash');goTab('pedidos');
}
function doLogout(){curUser=null;['l-user','l-pass'].forEach(id=>document.getElementById(id).value='');document.getElementById('l-err').style.display='none';showScreen('s-login')}
function openSenhaModal(){
  ['senha-atual','senha-nova','senha-confirma'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('mo-senha').classList.add('open');
}
async function salvarSenha(){
  if(!curUser)return;
  const atual=document.getElementById('senha-atual').value;
  const nova=document.getElementById('senha-nova').value;
  const confirma=document.getElementById('senha-confirma').value;
  if(nova.length<4){toast('A nova senha precisa ter pelo menos 4 caracteres.');return}
  if(nova!==confirma){toast('A confirmação não confere.');return}
  const atualOk=remoteMode?curUser.passHash===await hashPass(atual):curUser.pass===atual;
  if(!atualOk){toast('Senha atual incorreta.');return}
  curUser.pass=nova;
  curUser.passHash=await hashPass(nova);
  const u=users.find(x=>x.id===curUser.id);
  if(u){u.pass=nova;u.passHash=curUser.passHash}
  await save();
  closeModal('mo-senha');
  toast('Senha alterada!');
}

// ── NAV ──
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function goTab(t){
  if(curUser?.role!=='admin'&&['pagos','resumo','historico','config'].includes(t))t='pedidos';
  ['pedidos','pagos','resumo','historico','config'].forEach(x=>{
    document.getElementById('tc-'+x).style.display=x===t?'':'none';
    const el=document.getElementById('nt-'+x);if(el)el.classList.toggle('active',x===t);
  });
  if(t==='pedidos')renderPedidos();
  if(t==='pagos')renderPagos();
  if(t==='resumo')renderResumo();
  if(t==='historico')renderHistorico();
  if(t==='config')renderConfig();
}

// ── PEDIDOS ──
function setFiltro(f,el){filtro=f;document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));el.classList.add('on');renderPedidos()}

function renderLoteStrip(){
  const strip=document.getElementById('lote-strip');
  const la=loteAtivo();
  if(curUser.role!=='admin'){
    const r=la?loteRest(la):0;
    strip.innerHTML=r>0
      ?`<div class="lote-strip"><div class="ls-left"><div class="ls-icon"><img class="stock-ico" src="stock-icon.jpg" alt=""></div><div class="ls-info"><div class="ls-label">${loteNome(la)}</div><div class="ls-bar-wrap"><div class="ls-bar"><div class="ls-fill" style="width:${Math.min(100,((la.qtd-r)/la.qtd)*100)}%"></div></div><span class="ls-qty">${r} restantes</span></div></div></div></div>`
      :`<div class="lote-empty"><i class="ti ti-alert-triangle" style="font-size:18px"></i><span>Sem estoque disponível</span></div>`;
    return;
  }
  if(!la){strip.innerHTML=`<div class="lote-empty"><i class="ti ti-alert-triangle" style="font-size:18px"></i><span>Nenhum lote ativo — <b onclick="goTab('config')" style="cursor:pointer;text-decoration:underline">cadastre um lote</b></span></div>`;return}
  const r=loteRest(la);const pct=la.qtd?Math.min(100,((la.qtd-r)/la.qtd)*100):0;
  const fila=lotes.slice().sort((a,b)=>a.id-b.id).filter(l=>l.id!==la.id&&loteRest(l)>0);
  strip.innerHTML=`<div class="lote-strip"><div class="ls-left"><div class="ls-icon"><img class="stock-ico" src="stock-icon.jpg" alt=""></div><div class="ls-info"><div class="ls-label">${loteNome(la)}${fila.length?` · +${fila.length} na fila`:''}</div><div class="ls-bar-wrap"><div class="ls-bar"><div class="ls-fill" style="width:${pct}%"></div></div><span class="ls-qty">${r} / ${la.qtd} restantes</span></div></div></div><button class="ls-btn" onclick="goTab('config')">Lotes</button></div>`;
}

const spClass=s=>({solicitado:'sp-sol',pedido:'sp-ped',entregue:'sp-ent',pago:'sp-pag'}[s]||'sp-ped');
const spLabel=s=>({solicitado:'Aguard. aprovação',pedido:'Pendente',entregue:'Entregue',pago:'Pago'}[s]||s);

function renderPedidos(){
  const mp=myPedidos();
  const antigos=mp.filter(p=>!['pago','solicitado'].includes(p.status)&&diffDays(p.data)>5);
  document.getElementById('notif-div').innerHTML=antigos.length
    ?`<div class="notif"><i class="ti ti-alert-circle"></i><span><b>${antigos.length} pedido${antigos.length>1?'s':''}</b> há mais de 5 dias sem pagamento</span></div>`:'';
  document.getElementById('dot-pedidos').classList.toggle('show',antigos.length>0);
  renderLoteStrip();

  const is_admin=curUser.role==='admin';
  if(is_admin){
    const sol=mp.filter(p=>p.status==='solicitado').length;
    document.getElementById('stats-row').innerHTML=`
      <div class="sc"><div class="sc-l">Aprovar</div><div class="sc-v ca">${sol}</div><div class="sc-sub">solicitações</div></div>
      <div class="sc"><div class="sc-l">Pendentes</div><div class="sc-v">${mp.filter(p=>p.status==='pedido').length}</div><div class="sc-sub">p/ entrega</div></div>
      <div class="sc"><div class="sc-l">Entregues</div><div class="sc-v cb">${mp.filter(p=>p.status==='entregue').length}</div><div class="sc-sub">p/ pagamento</div></div>
      <div class="sc"><div class="sc-l">Pagos</div><div class="sc-v cg">${mp.filter(p=>p.status==='pago').length}</div><div class="sc-sub">concluídos</div></div>`;
  } else {
    document.getElementById('stats-row').innerHTML=`
      <div class="sc"><div class="sc-l">Lancados</div><div class="sc-v">${mp.filter(p=>p.status==='solicitado').length}</div><div class="sc-sub">aguardando</div></div>
      <div class="sc"><div class="sc-l">Aprovados</div><div class="sc-v cb">${mp.filter(p=>['pedido','entregue','pago'].includes(p.status)).length}</div><div class="sc-sub">sem valores</div></div>
      <div class="sc"><div class="sc-l">Aguardando</div><div class="sc-v ca">${mp.filter(p=>p.status==='solicitado').length}</div><div class="sc-sub">aprovação</div></div>
      <div class="sc"><div class="sc-l">Entregues</div><div class="sc-v cb">${mp.filter(p=>p.status==='entregue').length}</div><div class="sc-sub">p/ pagar</div></div>`;
  }

  let list=mp.filter(p=>p.status!=='pago');
  if(filtro==='pedido')list=list.filter(p=>['pedido','solicitado'].includes(p.status));
  if(filtro==='entregue')list=list.filter(p=>p.status==='entregue');
  list=list.slice().reverse();

  if(!list.length){document.getElementById('pedidos-list').innerHTML='<div class="empty"><i class="ti ti-clipboard-off"></i><span>Nenhum pedido aqui</span></div>';return}

  const stripeC=s=>({solicitado:'stripe-sol',pedido:'stripe-ped',entregue:'stripe-ent',pago:'stripe-pag'}[s]||'stripe-ped');
  document.getElementById('pedidos-list').innerHTML=list.map(p=>{
    const old=diffDays(p.data)>5;
    const lote=lotes.find(l=>l.id===p.loteId);
    return `<div class="pc" id="pc-${p.id}">
      <div class="pc-top" onclick="toggleCard(${p.id})">
        <div class="pc-stripe ${stripeC(p.status)}"></div>
        <div class="pc-main">
          <div class="pc-name">${p.cliente}</div>
          <div class="pc-sub">${p.qtd} qtd · ${fmtFull(p.data)}${is_admin?' · '+revName(p.rev):''}</div>
        </div>
        <div class="pc-right">
          ${is_admin?`<div class="pc-val">${R$(p.valor)}</div>`:`<span class="sp ${spClass(p.status)}">${spLabel(p.status)}</span>`}
          ${old?`<span class="pc-age">${diffDays(p.data)}d</span>`:`<i class="ti ti-chevron-down pc-chevron"></i>`}
        </div>
      </div>
      <div class="pc-detail">
        <div class="pd-divider"></div>
        <div class="pd-grid">
          <div class="pd-item"><div class="pd-lbl">Status</div><div class="pd-val"><span class="sp ${spClass(p.status)}">${spLabel(p.status)}</span></div></div>
          ${is_admin?`<div class="pd-item"><div class="pd-lbl">Valor</div><div class="pd-val">${R$(p.valor)}${p.desconto?` <span style="font-size:11px;color:var(--t3)">(-${R$(p.desconto)})</span>`:''}</div></div>`:''}
          <div class="pd-item"><div class="pd-lbl">Pagamento</div><div class="pd-val"><span class="pp ${pgtoClass(p.pgto)}">${pgtoLabel(p.pgto)}</span></div></div>
          ${lote?`<div class="pd-item"><div class="pd-lbl">Lote</div><div class="pd-val">${loteNome(lote)}</div></div>`:'<div class="pd-item"><div class="pd-lbl">Data</div><div class="pd-val">${fmtFull(p.data)}</div></div>'}
          ${is_admin?`<div class="pd-item"><div class="pd-lbl">Revendedor</div><div class="pd-val">${revName(p.rev)}</div></div>`:''}
          ${lote?`<div class="pd-item"><div class="pd-lbl">Data</div><div class="pd-val">${fmtFull(p.data)}</div></div>`:''}
        </div>
        ${p.obs?`<div class="pc-obs"><i class="ti ti-notes" style="font-size:14px"></i><span>${p.obs}</span></div>`:''}
        ${is_admin&&p.status==='solicitado'?`<button class="pd-approve" onclick="aprovarPedido(${p.id})"><i class="ti ti-check"></i> Aprovar pedido</button>`:''}
        ${is_admin?`<div class="pd-acts">
          ${p.status==='pedido'?`<button class="pd-act blue" onclick="setStatus(${p.id},'entregue')"><i class="ti ti-truck"></i>Entregue</button>`:''}
          ${['pedido','entregue'].includes(p.status)?`<button class="pd-act green" onclick="setStatus(${p.id},'pago')"><i class="ti ti-coin"></i>Pago</button>`:''}
          <button class="pd-act" onclick="openEdit(${p.id})"><i class="ti ti-pencil"></i>Editar</button>
          <button class="pd-act danger" onclick="excluir(${p.id})"><i class="ti ti-trash"></i>Excluir</button>
        </div>`:''}
      </div>
    </div>`;
  }).join('');
}

function toggleCard(id){
  const el=document.getElementById('pc-'+id);if(!el)return;
  const was=el.classList.contains('open');
  document.querySelectorAll('.pc.open').forEach(c=>c.classList.remove('open'));
  if(!was)el.classList.add('open');
}

async function setStatus(id,s){
  const p=pedidos.find(x=>x.id===id);if(!p)return;
  if(curUser.role!=='admin'){toast('Somente o admin pode alterar status.');return}
  p.status=s;if(s==='pago')p.dataPago=today();
  await save();renderPedidos();toast(s==='pago'?'✓ Marcado como pago':'✓ Marcado como entregue');
}
async function aprovarPedido(id){
  if(curUser.role!=='admin')return;
  const p=pedidos.find(x=>x.id===id);if(!p)return;
  const la=loteAtivo();
  if(!la){toast('Cadastre um lote antes de aprovar.');return}
  if(loteRest(la)<p.qtd){toast(`Estoque insuficiente. Restam ${loteRest(la)} qtd.`);return}
  p.loteId=la.id;p.status='pedido';
  await save();renderPedidos();toast('✓ Pedido aprovado!');
}

// ── MODAL PEDIDO ──
function calcTotal(){
  const q=parseInt(document.getElementById('m-qtd').value)||0;
  const d=parseFloat(document.getElementById('m-desc').value)||0;
  document.getElementById('m-total').textContent=R$(Math.max(0,q*PRECO-d));
}
function openModalPedido(){
  const la=loteAtivo();
  if(!la){toast('Cadastre um lote antes de criar pedidos.');return}
  const revs=users.filter(u=>u.role==='rev');
  document.getElementById('m-rev').innerHTML=revs.map(u=>`<option value="${u.id}">${u.name}</option>`).join('');
  document.getElementById('m-rev-f').style.display=curUser.role==='admin'&&revs.length?'':'none';
  ['m-nome','m-obs'].forEach(id=>document.getElementById(id).value='');
  ['m-qtd','m-desc'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('m-pgto').value='pix';
  document.getElementById('m-total').textContent='R$ 0,00';
  document.getElementById('mo-pedido').classList.add('open');
}
async function salvarPedido(){
  const la=loteAtivo();if(!la){toast('Sem lote ativo.');return}
  const nome=document.getElementById('m-nome').value.trim();
  const qtd=parseInt(document.getElementById('m-qtd').value)||0;
  const desc=parseFloat(document.getElementById('m-desc').value)||0;
  const val=Math.max(0,qtd*PRECO-desc);
  const pgto=document.getElementById('m-pgto').value;
  const obs=document.getElementById('m-obs').value.trim();
  const rev=curUser.role==='rev'?curUser.id:(document.getElementById('m-rev').value||curUser.id);
  if(!nome||qtd<=0){toast('⚠ Preencha nome e quantidade');return}
  if(curUser.role==='admin'&&qtd>loteRest(la)){toast(`Estoque insuficiente. Restam ${loteRest(la)} qtd.`);return}
  pedidos.push({id:nextId++,cliente:nome,qtd,valor:val,desconto:desc,status:curUser.role==='admin'?'pedido':'solicitado',rev,data:today(),pgto,obs,loteId:curUser.role==='admin'?la.id:null});
  await save();closeModal('mo-pedido');renderPedidos();toast('✓ Pedido registrado!');
}

// ── EDITAR / EXCLUIR ──
function openEdit(id){
  const p=pedidos.find(x=>x.id===id);if(!p)return;
  document.getElementById('e-id').value=id;
  document.getElementById('e-nome').value=p.cliente;
  document.getElementById('e-qtd').value=p.qtd;
  document.getElementById('e-val').value=p.valor;
  document.getElementById('e-pgto').value=p.pgto||'pix';
  document.getElementById('e-obs').value=p.obs||'';
  document.getElementById('mo-edit').classList.add('open');
}
async function salvarEdicao(){
  const id=parseInt(document.getElementById('e-id').value);
  const p=pedidos.find(x=>x.id===id);if(!p)return;
  const nome=document.getElementById('e-nome').value.trim();
  const qtd=parseInt(document.getElementById('e-qtd').value)||0;
  const val=parseFloat(document.getElementById('e-val').value)||0;
  if(!nome||qtd<=0||val<=0){toast('⚠ Preencha todos os campos');return}
  p.cliente=nome;p.qtd=qtd;p.valor=val;
  p.pgto=document.getElementById('e-pgto').value;
  p.obs=document.getElementById('e-obs').value.trim();
  await save();closeModal('mo-edit');renderPedidos();toast('✓ Atualizado!');
}
async function excluir(id){
  if(!confirm('Excluir este pedido?'))return;
  pedidos=pedidos.filter(x=>x.id!==id);await deleteRemote('orders',id);await save();renderPedidos();toast('Pedido excluído');
}
function closeModal(id){document.getElementById(id).classList.remove('open')}

// ── PAGOS ──
function renderPagos(){
  const list=pedidos.filter(p=>p.status==='pago').slice().reverse();
  if(!list.length){document.getElementById('pagos-list').innerHTML='<div class="empty"><i class="ti ti-coin-off"></i><span>Nenhum pagamento ainda</span></div>';return}
  const total=list.reduce((s,p)=>s+p.valor,0);
  let html=`<div class="stats" style="margin-bottom:14px"><div class="sc" style="grid-column:span 2"><div class="sc-l">Total recebido</div><div class="sc-v cg">${R$(total)}</div><div class="sc-sub">${list.length} pedidos pagos</div></div></div>`;
  let lastD='';
  list.forEach(p=>{
    if(p.dataPago!==lastD){html+=`<div class="slabel">${fmtFull(p.dataPago)}</div>`;lastD=p.dataPago}
    html+=`<div class="pago-card"><div class="pago-dot"></div><div class="pago-body"><div class="pago-nome">${p.cliente}</div><div class="pago-meta">${p.qtd} qtd · <span class="pp ${pgtoClass(p.pgto)}">${pgtoLabel(p.pgto)}</span> · ${revName(p.rev)}${p.obs?` · <em>${p.obs}</em>`:''}</div></div><div class="pago-val">${R$(p.valor)}</div></div>`;
  });
  document.getElementById('pagos-list').innerHTML=html;
}

// ── RESUMO ──
function setPeriodo(p,el){periodo=p;document.querySelectorAll('.ptab').forEach(x=>x.classList.remove('on'));el.classList.add('on');renderResumo()}
function renderResumo(){
  const pLabel={semana:'últimos 7 dias',mes:'este mês',ano:'este ano'};
  const allF=filterByPeriod(pedidos,'data');
  const pgF=filterByPeriod(pedidos.filter(p=>p.status==='pago'),'dataPago');
  const total=allF.reduce((s,p)=>s+p.valor,0);
  const totQtd=allF.reduce((s,p)=>s+p.qtd,0);
  const lotesCount=new Set(allF.map(p=>p.loteId).filter(Boolean)).size;
  const vendedoresCount=new Set(allF.map(p=>p.rev)).size;
  let html=`<div style="font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px">Período: ${pLabel[periodo]}</div>`;
  html+=`<div class="stats">
    <div class="sc" onclick="abrirDetalhe('geral')" style="cursor:pointer"><div class="sc-l">Valor total</div><div class="sc-v">${R$(total)}</div><div class="sc-sub">toque p/ detalhar</div></div>
    <div class="sc" onclick="abrirDetalhe('geral')" style="cursor:pointer"><div class="sc-l">Quantidade</div><div class="sc-v">${totQtd} qtd</div><div class="sc-sub">${allF.length} pedidos</div></div>
    <div class="sc" onclick="abrirDetalhe('lotes')" style="cursor:pointer"><div class="sc-l">Lotes usados</div><div class="sc-v cb">${lotesCount}</div><div class="sc-sub">por estoque</div></div>
    <div class="sc" onclick="abrirDetalhe('vendedores')" style="cursor:pointer"><div class="sc-l">Vendedores</div><div class="sc-v cg">${vendedoresCount}</div><div class="sc-sub">por lote</div></div>
  </div>`;
  const revData=users.filter(u=>u.role==='rev').map(r=>{
    const ra=allF.filter(p=>p.rev===r.id);const rp=pgF.filter(p=>p.rev===r.id);
    return{id:r.id,name:r.name,tot:ra.reduce((s,p)=>s+p.valor,0),pg:rp.reduce((s,p)=>s+p.valor,0),qtd:ra.reduce((s,p)=>s+p.qtd,0),c:ra.length};
  }).filter(r=>r.c>0);
  html+=`<div class="slabel">Resumo rápido</div>`;
  html+=`<div class="rev-card" onclick="abrirDetalhe('lotes')"><div class="rc-head"><div class="rc-name">Por lote</div><div class="rc-count">Toque para detalhar</div></div><div class="pago-meta">${lotesCount} lote${lotesCount!==1?'s':''} usados · ${totQtd} qtd vendidas</div></div>`;
  if(revData.length){
    html+=`<div class="rev-card" onclick="abrirDetalhe('vendedores')"><div class="rc-head"><div class="rc-name">Por vendedor e lote</div><div class="rc-count">Toque para detalhar</div></div><div class="pago-meta">${vendedoresCount} vendedor${vendedoresCount!==1?'es':''} · ${allF.length} pedidos</div></div>`;
  }
  document.getElementById('resumo-content').innerHTML=html;
}
function abrirDetalhe(tipo){
  const allF=filterByPeriod(pedidos,'data');const pgF=filterByPeriod(pedidos.filter(p=>p.status==='pago'),'dataPago');
  let html='';
  if(tipo==='geral'){
    document.getElementById('det-title').textContent='Resumo detalhado';
    const recebido=pgF.reduce((s,p)=>s+p.valor,0);
    const pendente=allF.filter(p=>p.status!=='pago').reduce((s,p)=>s+p.valor,0);
    html=`<div class="det-row"><span>Valor total</span><strong>${R$(allF.reduce((s,p)=>s+p.valor,0))}</strong></div>
      <div class="det-row"><span>Recebido</span><strong>${R$(recebido)}</strong></div>
      <div class="det-row"><span>Pendente</span><strong>${R$(pendente)}</strong></div>
      <div class="det-row"><span>Pedidos</span><strong>${allF.length}</strong></div>
      <div class="det-row"><span>Quantidade vendida</span><strong>${allF.reduce((s,p)=>s+p.qtd,0)} qtd</strong></div>
      <div class="det-row"><span>Descontos</span><strong>${R$(allF.reduce((s,p)=>s+(p.desconto||0),0))}</strong></div>`;
  }
  if(tipo==='lotes'){
    document.getElementById('det-title').textContent='Resumo por lote';
    lotes.slice().reverse().forEach(l=>{
      const items=allF.filter(p=>p.loteId===l.id);if(!items.length)return;
      html+=`<div class="det-sub">${loteNome(l)}</div>
        <div class="det-row"><span>Vendido</span><strong>${items.reduce((s,p)=>s+p.qtd,0)} qtd</strong></div>
        <div class="det-row"><span>Valor total</span><strong>${R$(items.reduce((s,p)=>s+p.valor,0))}</strong></div>
        <div class="det-row"><span>Pedidos</span><strong>${items.length}</strong></div>
        <div class="det-row"><span>Restante no lote</span><strong>${loteRest(l)} qtd</strong></div>`;
    });
  }
  if(tipo==='vendedores'){
    document.getElementById('det-title').textContent='Vendedores por lote';
    users.filter(u=>u.role==='rev').forEach(r=>{
      const vp=allF.filter(p=>p.rev===r.id);if(!vp.length)return;
      html+=`<div class="det-sub">${r.name}</div>
        <div class="det-row"><span>Total vendido</span><strong>${vp.reduce((s,p)=>s+p.qtd,0)} qtd · ${R$(vp.reduce((s,p)=>s+p.valor,0))}</strong></div>`;
      lotes.slice().reverse().forEach(l=>{
        const items=vp.filter(p=>p.loteId===l.id);if(!items.length)return;
        html+=`<div class="det-row"><span>${loteNome(l)} · ${items.length} pedido${items.length!==1?'s':''}</span><strong>${items.reduce((s,p)=>s+p.qtd,0)} qtd · ${R$(items.reduce((s,p)=>s+p.valor,0))}</strong></div>`;
      });
    });
  }
  if(!html)html='<div class="empty" style="padding:1.5rem"><i class="ti ti-chart-bar-off"></i><span>Nenhum dado nesse período</span></div>';
  document.getElementById('det-body').innerHTML=html;
  document.getElementById('mo-det').classList.add('open');
}

// ── HISTÓRICO ──
function renderHistorico(){
  const q=(document.getElementById('hist-input')?.value||'').trim().toLowerCase();
  const nomes=[...new Set(pedidos.map(p=>p.cliente))].sort();
  const fil=q?nomes.filter(n=>n.toLowerCase().includes(q)):nomes;
  document.getElementById('hist-pills').innerHTML=fil.map(n=>{
    const c=pedidos.filter(p=>p.cliente===n).length;
    return`<span class="cpill${histCliente===n?' on':''}" onclick="verCliente('${n}')">${n} <span class="cpill-ct">${c}</span></span>`;
  }).join('');
  if(histCliente){
    const list=pedidos.filter(p=>p.cliente.toLowerCase()===histCliente.toLowerCase()).slice().reverse();
    const total=list.reduce((s,p)=>s+p.valor,0);
    let html=`<div class="slabel">Pedidos de ${histCliente}</div>
      <div class="sc" style="margin-bottom:12px"><div class="sc-l">Total gasto</div><div class="sc-v">${R$(total)}</div><div class="sc-sub">${list.length} pedidos</div></div>`;
    list.forEach(p=>{
      html+=`<div class="pago-card" style="border-color:var(--br)">
        <div class="pago-dot" style="background:${p.status==='pago'?'var(--g)':p.status==='entregue'?'var(--b)':'#FCD34D'}"></div>
        <div class="pago-body">
          <div class="pago-nome">${fmtFull(p.data)} · <span class="sp ${spClass(p.status)}">${spLabel(p.status)}</span></div>
          <div class="pago-meta">${p.qtd} qtd · ${pgtoLabel(p.pgto)} · ${revName(p.rev)}${p.obs?` · ${p.obs}`:''}</div>
        </div>
        <div class="pago-val">${R$(p.valor)}</div>
      </div>`;
    });
    document.getElementById('hist-det').innerHTML=html;
  } else {document.getElementById('hist-det').innerHTML=''}
}
function verCliente(n){histCliente=n;document.getElementById('hist-input').value=n;renderHistorico()}

// ── CONFIG ──
function renderConfig(){
  let lh='';
  lotes.slice().reverse().forEach(l=>{
    const r=loteRest(l);const pct=l.qtd?Math.min(100,((l.qtd-r)/l.qtd)*100):0;
    const usado=loteUsado(l.id);
    lh+=`<div class="lote-strip" style="margin-bottom:8px;flex-direction:column;align-items:stretch;gap:8px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><div class="ls-label">${loteNome(l)}</div><div style="font-size:12px;color:var(--t3);margin-top:2px">${l.obs||''}</div></div>
        <span style="font-size:13px;font-weight:700;color:${r>0?'var(--gd)':'var(--t3)'}">${r} restantes</span>
      </div>
      <div class="ls-bar-wrap"><div class="ls-bar" style="flex:1"><div class="ls-fill" style="width:${pct}%"></div></div><span class="ls-qty">${l.qtd-r}/${l.qtd} usados</span></div>
      <div class="lote-actions">
        <button class="edit" onclick="openModalLote(${l.id})"><i class="ti ti-pencil" style="font-size:13px"></i> Editar</button>
        <button class="danger" onclick="excluirLote(${l.id})" ${usado>0?'title="Lote com pedidos não pode ser excluído"':''}><i class="ti ti-trash" style="font-size:13px"></i> Excluir</button>
      </div>
    </div>`;
  });
  document.getElementById('lotes-list').innerHTML=lh||'<div class="empty" style="padding:1.5rem"><i class="ti ti-package-off"></i><span>Nenhum lote cadastrado</span></div>';
  const admins=users.filter(u=>u.role==='admin');
  const revs=users.filter(u=>u.role==='rev');
  document.getElementById('cap-warn').style.display=revs.length>=5?'flex':'none';
  let uh='';
  admins.forEach(u=>{
    const canDemote=admins.length>1&&u.id!==curUser.id;
    uh+=`<div class="user-item" style="margin-bottom:8px"><div class="u-left"><div class="u-av adm">${ini(u.name)}</div><div><div class="u-name">${u.name}</div><div class="u-meta">@${u.username} · Admin</div></div></div><div class="user-actions">${canDemote?`<button class="role-btn rev" onclick="setUserRole('${u.id}','rev')">Virar revendedor</button>`:''}</div></div>`;
  });
  if(!revs.length)uh+=`<div class="empty" style="padding:1.5rem"><i class="ti ti-user-off"></i><span>Nenhum revendedor ainda</span></div>`;
  revs.forEach(u=>uh+=`<div class="user-item"><div class="u-left"><div class="u-av">${ini(u.name)}</div><div><div class="u-name">${u.name}</div><div class="u-meta">@${u.username} · Revendedor · ${pedidos.filter(p=>p.rev===u.id).length} pedidos</div></div></div><div class="user-actions"><button class="role-btn admin" onclick="setUserRole('${u.id}','admin')">Tornar admin</button><button class="del-btn" onclick="delUser('${u.id}')"><i class="ti ti-trash" style="font-size:15px"></i></button></div></div>`);
  document.getElementById('users-list').innerHTML=uh;
}
async function addUser(){
  const nome=document.getElementById('u-nome').value.trim();
  const u=document.getElementById('u-user').value.trim().toLowerCase();
  const p=document.getElementById('u-pass').value;
  if(!nome||!u||p.length<4){toast('⚠ Preencha tudo (senha mín. 4)');return}
  if(users.find(x=>x.username.toLowerCase()===u)){toast('⚠ Usuário já existe');return}
  if(users.filter(x=>x.role==='rev').length>=5){toast('⚠ Limite atingido');return}
  users.push({id:u,name:nome,username:u,pass:p,passHash:await hashPass(p),role:'rev'});await save();
  ['u-nome','u-user','u-pass'].forEach(id=>document.getElementById(id).value='');
  renderConfig();toast(`✓ ${nome} adicionado!`);
}
async function delUser(id){
  if(pedidos.some(p=>p.rev===id)){toast('Esse revendedor tem pedidos. Altere para admin/revendedor, mas não remova.');return}
  if(!confirm('Remover este revendedor?'))return;
  users=users.filter(u=>u.id!==id);await deleteRemote('app_users',id);await save();renderConfig();toast('Removido');
}
async function setUserRole(id,role){
  const u=users.find(x=>x.id===id);if(!u)return;
  if(role==='rev'&&users.filter(x=>x.role==='admin').length<=1){toast('Precisa manter pelo menos um admin.');return}
  if(role==='admin'&&users.filter(x=>x.role==='rev').length<=0){toast('Nenhum revendedor para promover.');return}
  u.role=role;
  await save();renderConfig();
  toast(role==='admin'?`${u.name} agora tem acesso admin.`:`${u.name} voltou para revendedor.`);
}

// ── LOTES ──
function openModalLote(id=null){
  const lote=id?lotes.find(l=>l.id===id):null;
  document.getElementById('lote-modal-title').textContent=lote?'Editar lote':'Cadastrar lote';
  document.getElementById('lote-id').value=lote?lote.id:'';
  document.getElementById('lote-data').value=lote?lote.data:today();
  document.getElementById('lote-qtd').value=lote?lote.qtd:'';
  document.getElementById('lote-obs').value=lote?(lote.obs||''):'';
  document.getElementById('mo-lote').classList.add('open');
}
async function salvarLote(){
  const id=parseInt(document.getElementById('lote-id').value)||null;
  const data=document.getElementById('lote-data').value||today();
  const qtd=parseInt(document.getElementById('lote-qtd').value)||0;
  if(qtd<=0){toast('Informe a quantidade.');return}
  const obs=document.getElementById('lote-obs').value.trim();
  if(id){
    const lote=lotes.find(l=>l.id===id);if(!lote)return;
    const usado=loteUsado(id);
    if(qtd<usado){toast(`Este lote já tem ${usado} usado. A quantidade não pode ser menor.`);return}
    lote.data=data;lote.qtd=qtd;lote.obs=obs;
    await save();closeModal('mo-lote');renderConfig();renderPedidos();toast('✓ Lote atualizado!');
    return;
  }
  lotes.push({id:nextLoteId++,data,qtd,obs});
  await save();closeModal('mo-lote');renderConfig();renderPedidos();toast('✓ Lote cadastrado!');
}
async function excluirLote(id){
  const lote=lotes.find(l=>l.id===id);if(!lote)return;
  if(pedidos.some(p=>p.loteId===id)){toast('Este lote tem pedidos vinculados e não pode ser excluído.');return}
  if(!confirm(`Excluir ${loteNome(lote)}?`))return;
  lotes=lotes.filter(l=>l.id!==id);
  await deleteRemote('lots',id);
  await save();renderConfig();renderPedidos();toast('Lote excluído.');
}

// ── CSV ──
function exportCSV(){
  const allF=filterByPeriod(pedidos,'data');
  let csv='Cliente,Quantidade,Valor (R$),Status,Pagamento,Revendedor,Data Pedido,Data Pagamento,Obs\n';
  allF.forEach(p=>csv+=`"${p.cliente}",${p.qtd},${p.valor.toFixed(2)},"${p.status}","${pgtoLabel(p.pgto)}","${revName(p.rev)}","${fmtFull(p.data)}","${p.dataPago?fmtFull(p.dataPago):''}","${p.obs||''}"\n`);
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));a.download=`0v0_${periodo}.csv`;a.click();toast('✓ CSV exportado!');
}

// ── INIT ──
async function initApp(){
  load();
  if(await loadRemote()){
    ss('0v0_backend','supabase');
    ss('0v0_u',JSON.stringify(users));
    ss('0v0_p',JSON.stringify(pedidos));
    ss('0v0_l',JSON.stringify(lotes));
  }
  applyTheme();
}
initApp();
document.querySelectorAll('.mo').forEach(mo=>mo.addEventListener('click',e=>{if(e.target===mo)mo.classList.remove('open')}));
</script>
